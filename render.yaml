# Render Blueprint: Web Service + PostgreSQL
# https://render.com/docs/blueprint-spec
# Connect your repo and add this blueprint, or create services manually with the same settings.

services:
  - type: web
    name: price-searcher
    runtime: python
    # No rootDir: run from git root, reference price_searcher/ explicitly
    # This ensures gunicorn is installed in the standard venv location and found at startup
    buildCommand: pip install -r price_searcher/requirements.txt && python price_searcher/manage.py collectstatic --noinput
    startCommand: gunicorn --chdir price_searcher price_searcher.wsgi:application --bind 0.0.0.0:$PORT
    releaseCommand: python price_searcher/manage.py migrate --noinput
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: price-searcher-db
          property: connectionString
      - key: RAKUTEN_APP_ID
        sync: false

databases:
  - name: price-searcher-db
    plan: free
    databaseName: price_searcher
    user: price_searcher
