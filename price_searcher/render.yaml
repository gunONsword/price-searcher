# Render Blueprint: Web Service + PostgreSQL
# https://render.com/docs/blueprint-spec
# Connect your repo and add this blueprint, or create services manually with the same settings.

services:
  - type: web
    name: price-searcher
    runtime: python
    # If your repo root IS the Django app (only this folder), leave rootDir blank or remove it.
    # If your repo has a parent folder and this app is in price_searcher/, set rootDir: price_searcher
    # rootDir: price_searcher
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn price_searcher.wsgi:application
    releaseCommand: python manage.py migrate --noinput
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: price-searcher-db
          property: connectionString
      - key: RAKUTEN_APP_ID
        sync: false

databases:
  - name: price-searcher-db
    plan: free
    databaseName: price_searcher
    user: price_searcher
